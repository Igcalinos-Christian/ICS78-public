<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4ece6;
}

/* Login Card */

.login-card{
width:300px;
padding:40px 30px;
background:linear-gradient(180deg,#c9eeee,#b9e5e5);
border-radius:8px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* Title */

.login-card h2{
color:#1c7f8c;
margin-bottom:20px;
}

/* Inputs */

.login-card input{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:20px;
outline:none;
background:#fff;
}

/* Button */

.login-card button{
width:90px;
padding:8px;
border:none;
border-radius:20px;
background:#2fb4c1;
color:white;
font-weight:bold;
cursor:pointer;
}

.login-card button:hover{
background:#239aa6;
}

/* Links */

.links{
margin-top:15px;
font-size:13px;
}

.links a{
display:block;
color:#1c7f8c;
text-decoration:none;
margin-top:3px;
}

.links a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-card">

<h2>Log-in</h2>

<form action="login.php" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<a href="#">Sign up</a>
<a href="#">Forgot password</a>
</div>

</div>

</body>
</html>
