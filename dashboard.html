<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Building Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4ece6;
height:100vh;
display:flex;
flex-direction:column;
}

/* Header */

.header{
background:linear-gradient(180deg,#c9eeee,#b9e5e5);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#1c7f8c;
}

/* Layout */

.main{
flex:1;
display:flex;
}

/* Map */

#map{
flex:2;
}

/* Sidebar */

.sidebar{
flex:1;
background:white;
padding:20px;
box-shadow:-3px 0 10px rgba(0,0,0,0.1);
}

/* Information board */

.board{
background:linear-gradient(180deg,#c9eeee,#b9e5e5);
padding:15px;
border-radius:8px;
margin-bottom:20px;
color:#1c7f8c;
}

/* Form */

.sidebar h3{
margin-bottom:10px;
color:#1c7f8c;
}

.sidebar input,
.sidebar select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:20px;
background:#f5f5f5;
outline:none;
}

.sidebar button{
width:120px;
padding:10px;
border:none;
border-radius:20px;
background:#2fb4c1;
color:white;
font-weight:bold;
cursor:pointer;
}

.sidebar button:hover{
background:#239aa6;
}

</style>
</head>

<body>

<div class="header">
Campus Building Dashboard
</div>

<div class="main">

<div id="map"></div>

<div class="sidebar">

<div class="board">
<h3>Information Board</h3>
<p>Total Buildings: <span id="buildingCount">0</span></p>
</div>

<h3>Add Building</h3>

<form id="buildingForm">

<select id="buildingName" required>
<option value="">Select Building</option>
<option value="Laboratory">Laboratory</option>
<option value="SWDC">SWDC</option>
</select>

<select id="buildingFloors" required>
<option value="">Select Floor</option>
</select>

<input type="number" id="rooms" placeholder="Number of Rooms" required>

<button type="submit">Add</button>

</form>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* initialize map */

var map = L.map('map').setView([14.6507,121.1029],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let count = 0;

/* map click for coordinates */

map.on("click",function(e){

document.getElementById("lat").value = e.latlng.lat.toFixed(6);
document.getElementById("lng").value = e.latlng.lng.toFixed(6);

});

/* change floor options */

const buildingSelect = document.getElementById("buildingName");
const floorSelect = document.getElementById("buildingFloors");

buildingSelect.addEventListener("change",function(){

floorSelect.innerHTML = '<option value="">Select Floor</option>';

if(this.value === "Laboratory"){

floorSelect.innerHTML += '<option value="Lab1">Lab1</option>';
floorSelect.innerHTML += '<option value="Lab2">Lab2</option>';

}

if(this.value === "SWDC"){

floorSelect.innerHTML += '<option value="1st Floor">1st Floor</option>';
floorSelect.innerHTML += '<option value="2nd Floor">2nd Floor</option>';
floorSelect.innerHTML += '<option value="3rd Floor">3rd Floor</option>';

}

});

/* add building marker */

document.getElementById("buildingForm").addEventListener("submit",function(e){

e.preventDefault();

const name = document.getElementById("buildingName").value;
const floor = document.getElementById("buildingFloors").value;
const rooms = document.getElementById("rooms").value;
const lat = document.getElementById("lat").value;
const lng = document.getElementById("lng").value;

if(lat === "" || lng === ""){
alert("Please click the map to get coordinates.");
return;
}

L.marker([lat,lng]).addTo(map)
.bindPopup(
"<b>"+name+"</b><br>"+
"Floor: "+floor+"<br>"+
"Rooms: "+rooms
);

count++;
document.getElementById("buildingCount").innerText = count;

this.reset();
floorSelect.innerHTML = '<option value="">Select Floor</option>';

});

</script>

</body>
</html>
